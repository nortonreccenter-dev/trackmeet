<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Track & Field Registration</title>

<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;margin:0}
main{max-width:900px;margin:auto;padding:20px}
.card{background:white;border-radius:10px;padding:20px;margin-bottom:20px}
label{display:block;margin-top:10px;font-weight:bold}
input,select{width:100%;padding:8px;margin-top:4px}
button{padding:12px 16px;border:none;background:#111;color:white;border-radius:6px;margin-top:15px;cursor:pointer}
.small{font-size:12px;color:#555}
.hide{display:none}
</style>
</head>

<body>

<main>

<h1>Youth Track Registration</h1>

<form id="entryForm">

<div class="card">

<h2>Participant</h2>

<label>First Name</label>
<input id="firstName" required>

<label>Last Name</label>
<input id="lastName" required>

<label>Grade</label>
<select id="grade" required>
<option value="">Select</option>
<option>K</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<label>Age on May 1</label>
<input id="age" type="number" required>

<label>Phone</label>
<input id="phone" required>

</div>


<div class="card">

<h2>Events (max 3)</h2>

<div>
<input type="checkbox" class="event" value="50m"> 50m<br>
<input type="checkbox" class="event" value="100m"> 100m<br>
<input type="checkbox" class="event" value="200m"> 200m<br>
<input type="checkbox" class="event" value="400m"> 400m<br>
<input type="checkbox" class="event" value="Long Jump"> Long Jump<br>
<input type="checkbox" class="event" value="Softball Throw"> Softball Throw<br>
<input type="checkbox" class="event" value="4x100 Relay" id="relay"> 4x100 Relay<br>
</div>

</div>


<div class="card hide" id="relayBox">

<h2>Relay Team</h2>

<label>Runner #2</label>
<input id="relay2">

<label>Runner #3</label>
<input id="relay3">

<label>Runner #4</label>
<input id="relay4">

</div>


<div class="card">

<h2>Participant Type</h2>

<select id="feeType" required>
<option value="">Select</option>
<option value="5">Norton County Participant ($5)</option>
<option value="20">Out of County Participant ($20)</option>
</select>

<label>Payment Method</label>

<select id="paymentMethod" required>
<option value="">Select</option>
<option value="square">Pay with Square</option>
<option value="inperson">Pay in Person</option>
</select>

</div>


<div class="card">

<h2>Parent Agreement</h2>

<label>Parent Name</label>
<input id="parentName" required>

<label>
<input type="checkbox" id="agree" required> I agree to the waiver
</label>

<button type="submit">Submit Registration</button>

</div>

</form>

<div id="status"></div>
<div id="paymentBox"></div>

</main>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUoQyAxV19Kt-CarrZe_Hf59Dh0h3RDJw9VNUz86KhcViVDJbJR2xKnG8qfiiECE66Zw/exec";

const SQUARE_5 = "https://square.link/u/IxZt7dsT";
const SQUARE_20 = "https://square.link/u/kmpovxye";


const events = document.querySelectorAll(".event");

events.forEach(e=>{

e.addEventListener("change",()=>{

let checked = document.querySelectorAll(".event:checked");

if(checked.length>3){
e.checked=false;
alert("Only 3 events allowed");
}

if(document.getElementById("relay").checked){
document.getElementById("relayBox").classList.remove("hide");
}else{
document.getElementById("relayBox").classList.add("hide");
}

});

});



document.getElementById("entryForm").addEventListener("submit",async e=>{

e.preventDefault();

let selected = [...document.querySelectorAll(".event:checked")].map(e=>e.value);

if(selected.includes("4x100 Relay")){

if(!relay2.value || !relay3.value || !relay4.value){
alert("Relay requires runners 2‑4");
return;
}

}

const data={
firstName:firstName.value,
lastName:lastName.value,
grade:grade.value,
age:age.value,
phone:phone.value,
events:selected,
relay2:relay2.value,
relay3:relay3.value,
relay4:relay4.value,
fee:feeType.value,
paymentMethod:paymentMethod.value,
parentName:parentName.value
};

try{

await fetch(SCRIPT_URL,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify(data)
});

document.getElementById("status").innerHTML="<b>Registration Submitted</b>";

if(paymentMethod.value==="square"){

let link = feeType.value==="5" ? SQUARE_5 : SQUARE_20;

document.getElementById("paymentBox").innerHTML=`
<h2>Complete Payment</h2>
<p>Click below to pay your registration fee.</p>
<a href="${link}" target="_blank">
<button>Pay with Square</button>
</a>
`;

}else{

document.getElementById("paymentBox").innerHTML="<p>Please bring payment to the event.</p>";

}

}catch(err){

alert("Submission failed");

}

});
</script>

</body>
</html>
